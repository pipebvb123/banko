<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banko.cl — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1629; --teal: #0E7490; --sky: #38BDF8;
      --orange: #F97316; --bg: #F0F7FF; --text: #1E3A5F;
      --gray: #64748B; --card: #FFFFFF; --border: #CBD5E1;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(14,116,144,.25) 0%, transparent 65%);
      top: -200px; left: -150px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(249,115,22,.12) 0%, transparent 65%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }
    .card {
      background: #fff;
      border-radius: 1.5rem;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
      position: relative;
      z-index: 1;
    }
    .logo-row {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo-name {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.5px;
    }
    .logo-name span { color: var(--teal); }
    .admin-chip {
      display: inline-block;
      background: var(--orange);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      margin-left: 6px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .card-title { font-size: 1.15rem; font-weight: 700; color: var(--navy); margin-bottom: .25rem; }
    .card-sub { font-size: 13px; color: var(--gray); margin-bottom: 1.5rem; }
    .field { margin-bottom: .9rem; }
    label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #F8FAFC;
      outline: none;
      transition: border-color .18s, background .18s;
    }
    input:focus { border-color: var(--teal); background: #fff; }
    .btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 100%);
      color: #fff; border: none; border-radius: 9px;
      font-size: 14.5px; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: .4rem;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .55; cursor: default; }
    .err {
      display: none;
      background: #FEF2F2; border: 1px solid #FCA5A5;
      color: #DC2626; border-radius: 8px;
      padding: 10px 13px; font-size: 13px; margin-top: .75rem;
    }
    .err.show { display: block; }
    .back { display: block; text-align: center; margin-top: 1.25rem; font-size: 13px; color: var(--gray); text-decoration: none; }
    .back:hover { color: var(--teal); }
    .sec-note {
      text-align: center; font-size: 11.5px; color: var(--gray);
      margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-name">banko<span>.cl</span><span class="admin-chip">Admin</span></div>
    </div>
    <div class="card-title">Panel de Administración</div>
    <div class="card-sub">Acceso restringido — solo administradores autorizados.</div>

    <form id="form" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="admin@banko.cl" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="btn">Ingresar al panel</button>
      <div id="err" class="err"></div>
    </form>

    <a href="/" class="back">← Volver al sitio principal</a>
    <div class="sec-note">🔒 Conexión segura · Sesión cifrada con Supabase Auth</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://hpsytgjlnhimsyaqrjvi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwc3l0Z2psbmhpbXN5YXFyanZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NDg4NDUsImV4cCI6MjA5MjMyNDg0NX0.8v-_gY4M04CjDfw6MUIEn8hMuk5SArroFAPK-p4H7F0';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Auto-redirect if already logged in as admin
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;
      const { data } = await sb.from('admins').select('id').eq('user_id', session.user.id).maybeSingle();
      if (data) window.location.href = '/admin/dashboard.html';
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn');
      const err      = document.getElementById('err');

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      err.classList.remove('show');

      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { showErr('Credenciales incorrectas. Verifica email y contraseña.'); return; }

      const { data: admin } = await sb.from('admins').select('id').eq('user_id', data.user.id).maybeSingle();
      if (!admin) {
        await sb.auth.signOut();
        showErr('Acceso denegado. Esta cuenta no tiene permisos de administrador.');
        return;
      }

      window.location.href = '/admin/dashboard.html';
    }

    function showErr(msg) {
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      btn.disabled = false;
      btn.textContent = 'Ingresar al panel';
      err.textContent = msg;
      err.classList.add('show');
    }
  </script>
</body>
</html>
